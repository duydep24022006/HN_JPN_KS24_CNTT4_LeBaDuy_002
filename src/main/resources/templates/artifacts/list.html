<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Quản Lý Hiện Vật Bảo Tàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container my-4">

    <div class=" mb-4">
        <h1 class="fw-bold"> Bảo Tàng Quốc Gia</h1>
        <p class="text-muted">Hệ thống Quản lý Hiện Vật</p>
    </div>



    <div class="d-flex justify-content-between align-items-center mb-3">
        <form th:action="@{/artifacts}" method="get" class="d-flex">
            <input type="text" name="keyword" th:value="${keyword}" class="form-control me-2"
                   placeholder=" Tìm theo tên hoặc nguồn gốc..."/>
            <button type="submit" class="btn btn-primary">Tìm kiếm</button>
            <a th:if="${keyword != null and !#strings.isEmpty(keyword)}"
               th:href="@{/artifacts}" class="btn btn-secondary ms-2"> Xoá lọc</a>
        </form>
        <a th:href="@{/artifacts/new}" class="btn btn-success">＋ Thêm Hiện Vật</a>
    </div>


    <div th:if="${!artifacts.isEmpty()}">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>STT</th>
                <th>Tên Hiện Vật</th>
                <th>Nguồn Gốc</th>
                <th>Ngày Tiếp Nhận</th>
                <th>Thao Tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="artifact, iterStat : ${artifacts}">
                <td th:text="${currentPage * 5 + iterStat.count}"></td>
                <td th:text="${artifact.name}"></td>
                <td th:text="${artifact.origin}"></td>
                <td th:text="${#temporals.format(artifact.date, 'dd/MM/yyyy')}"></td>
                <td>
                    <a th:href="@{/artifacts/edit/{id}(id=${artifact.id})}" class="btn btn-primary">Sửa</a>
                    <form th:action="@{/artifacts/delete/{id}(id=${artifact.id})}" method="post" class="d-inline"
                          onsubmit="return confirm('Bạn có chắc chắn muốn xóa?')">
                        <button type="submit" class="btn btn-primary"> Xóa</button>

                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${artifacts.isEmpty()}" class="text-center p-5 border rounded bg-light">
        <h3>Chưa có hiện vật nào</h3>
        <p>Nhấn <strong>"Thêm Hiện Vật"</strong> để bắt đầu thêm hiện vật đầu tiên.</p>
        <a th:href="@{/artifacts/create}" class="btn btn-success">＋ Thêm Hiện Vật Đầu Tiên</a>
    </div>

    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination ">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/artifacts(page=${currentPage - 1}, keyword=${keyword})}">← Trước</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/artifacts(page=${i}, keyword=${keyword})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/artifacts(page=${currentPage + 1}, keyword=${keyword})}">Sau →</a>
            </li>
        </ul>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
