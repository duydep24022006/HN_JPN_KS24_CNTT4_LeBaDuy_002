<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle} + ' | Bảo Tàng'">Form | Bảo Tàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container my-4">

    <h2 class="" th:text="${pageTitle}"></h2>

    <form th:action="${formAction}" th:object="${artifact}" method="post" novalidate>

        <input type="hidden" th:field="*{id}" th:if="${artifact.id != null}"/>

        <div class="mb-3">
            <label for="name" class="form-label">Tên Hiện Vật </label>
            <input type="text" id="name" th:field="*{name}" class="form-control"
                   placeholder="Nhập tên hiện vật" maxlength="150"/>
            <div th:if="${#fields.hasErrors('name')}" class="text-danger small" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label for="origin" class="form-label">Nguồn Gốc </label>
            <input type="text" id="origin" th:field="*{origin}" class="form-control"
                   placeholder="Nhập nguồn gốc hiện vật"/>
            <div th:if="${#fields.hasErrors('origin')}" class="text-danger small" th:errors="*{origin}"></div>
        </div>

        <div class="mb-3">
            <label for="date" class="form-label">Ngày Tiếp Nhận </label>
            <input type="date" id="date" th:field="*{date}" class="form-control"
                   th:max="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"/>
            <div th:if="${#fields.hasErrors('date')}" class="text-danger small" th:errors="*{date}"></div>
        </div>

        <div>
            <a th:href="@{/artifacts}" class="btn btn-secondary">Quay lại</a>
            <button type="submit" class="btn btn-primary"
                    th:text="${artifact.id != null} ? 'Cập nhật' : 'Thêm mới'"></button>
        </div>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
